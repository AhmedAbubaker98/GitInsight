services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=gitinsight
      - POSTGRES_PASSWORD=gitinsight
      - POSTGRES_DB=gitinsight
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api_service:
    build: ./api_service
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./api_service:/app/api_service
      - ./shared_config.py:/app/shared_config.py:ro
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

  repo_processor_worker:
    build: ./repo_processor_service
    volumes:
      - ./repo_processor_service:/app/repo_processor_service
      - ./shared_config.py:/app/shared_config.py:ro
      - /tmp/gitinsight_clones:/tmp/gitinsight_clones
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

  ai_analyzer_worker:
    build: ./ai_analyzer_service
    volumes:
      - ./ai_analyzer_service:/app/ai_analyzer_service
      - ./shared_config.py:/app/shared_config.py:ro
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

volumes:
  postgres_data:
  redis_data: